<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Creation Maker</title>

<div class="box">
  <h2>📷 AI Camera</h2>

  <video id="camera" autoplay playsinline muted
         style="width:100%;border-radius:12px;"></video>

  <canvas id="vision" style="display:none;"></canvas>

  <br>

  <button onclick="startCamera()">Start Camera</button>
  <button onclick="aiLook()">AI Look</button>
  <button onclick="worldCamera()">AI World Camera</button>
  <div id="visionOutput" class="card">
    Camera not started.
  </div>
</div>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#080014,#26104d);
  color:white;
  text-align:center;
}
h1{margin:20px 5px 5px}
p{color:#ddd}
.box{
  background:#17172b;
  margin:14px auto;
  padding:15px;
  width:90%;
  max-width:520px;
  border-radius:16px;
  box-shadow:0 0 12px black;
}
textarea,input{
  width:90%;
  padding:12px;
  margin:7px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
button{
  padding:12px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#8b35ff;
  color:white;
  font-weight:bold;
}
button:active{transform:scale(.96)}
.card{
  background:#272747;
  margin:10px;
  padding:12px;
  border-radius:12px;
  text-align:left;
}
.small{font-size:13px;color:#bbb}
</style>
</head>

<body>

<h1>🤖 AI Creation Maker</h1>
<p>The AI can learn, make items, see its creations, and upgrade them.</p>

<div class="box">
  <h2>🧠 Feed the AI</h2>
  <textarea id="feedText" placeholder="Teach it anything. Example: Make a digital circus world with magical cats, portals, crystals, and strange rooms."></textarea>
  <br>
  <button onclick="feedAI()">Feed AI</button>
</div>

<div class="box">
  <h2>📦 Add Your Own Item</h2>
  <input id="itemName" placeholder="Item name">
  <textarea id="itemPower" placeholder="What does it do?"></textarea>
  <br>
  <button onclick="addItem()">Add Item</button>
</div>

<div class="box">
  <h2>⚙️ AI Buttons</h2>
  <button onclick="makeItem()">AI Make Item</button>
  <button onclick="makeIdea()">AI Make Idea</button>
  <button onclick="seeCreations()">AI See Creations</button>
  <button onclick="evolveCreation()">AI Upgrade Creation</button>
  <button onclick="clearAll()">Reset</button>
</div>

<div class="box">
  <h2>💭 AI Thoughts</h2>
  <div id="thoughtBox">No thoughts yet.</div>
</div>

<div class="box">
  <h2>🧠 AI Memory</h2>
  <div id="memoryBox">No memory yet.</div>
</div>

<div class="box">
  <h2>✨ AI Creations</h2>
  <div id="creationBox">No creations yet.</div>
</div>

<script>
let memory = JSON.parse(localStorage.getItem("ai_memory")) || [];
let creations = JSON.parse(localStorage.getItem("ai_creations")) || [];
let thoughts = JSON.parse(localStorage.getItem("ai_thoughts")) || [];

const words = [
  "portal","crystal","glitch","dream","shadow","button",
  "cat","robot","circus","forest","machine","star","mirror",
  "monster","cloud","clock","secret room","digital world"
];

const powers = [
  "opens a hidden area",
  "creates a new item",
  "protects the world",
  "stores memories",
  "turns ideas into objects",
  "summons a helper",
  "changes the room",
  "makes characters smarter",
  "repairs broken things",
  "unlocks a new power",
  "builds a tiny world"
];

function save(){
  localStorage.setItem("ai_memory", JSON.stringify(memory));
  localStorage.setItem("ai_creations", JSON.stringify(creations));
  localStorage.setItem("ai_thoughts", JSON.stringify(thoughts));
}

function random(list){
  return list[Math.floor(Math.random() * list.length)];
}

function addThought(text){
  thoughts.unshift(text);
  if(thoughts.length > 30) thoughts.pop();
  save();
  update();
}

function update(){
  document.getElementById("memoryBox").innerHTML =
    memory.length ? memory.map(m=>`<div class="card">🧠 ${m}</div>`).join("") : "No memory yet.";

  document.getElementById("creationBox").innerHTML =
    creations.length ? creations.map(c=>`
      <div class="card">
        <b>✨ ${c.name}</b>
        <p>${c.power}</p>
        <div class="small">Created from: ${c.source}</div>
      </div>
    `).join("") : "No creations yet.";

  document.getElementById("thoughtBox").innerHTML =
    thoughts.length ? thoughts.map(t=>`<div class="card">💭 ${t}</div>`).join("") : "No thoughts yet.";
}

function feedAI(){
  let text = document.getElementById("feedText").value.trim();
  if(!text){ alert("Type something first."); return; }

  memory.push(text);
  document.getElementById("feedText").value = "";

  addThought("I learned something new: " + text);
  save();
  update();
}

function addItem(){
  let name = document.getElementById("itemName").value.trim();
  let power = document.getElementById("itemPower").value.trim();

  if(!name || !power){
    alert("Add an item name and what it does.");
    return;
  }

  creations.push({
    name:name,
    power:power,
    source:"made by you"
  });

  document.getElementById("itemName").value = "";
  document.getElementById("itemPower").value = "";

  addThought("I can see a new creation named " + name + ".");
  save();
  update();
}

function makeItem(){
  let learned = memory.length ? random(memory) : "a mysterious world";

  let name = random(words).toUpperCase() + " " + random(words).toUpperCase();

  let power = "This item can " + random(powers) +
  ". It was inspired by: " + learned;

  creations.push({
    name:name,
    power:power,
    source:"AI made it"
  });

  addThought("I made a new item called " + name + ".");
  save();
  update();
}

function makeIdea(){
  let learned = memory.length ? random(memory) : "nothing yet";
  let creation = creations.length ? random(creations).name : "a new object";

  let idea = "Make a world where " + creation +
  " connects with a " + random(words) +
  " and can " + random(powers) +
  ". Use this knowledge: " + learned;

  creations.push({
    name:"AI Idea",
    power:idea,
    source:"AI idea"
  });

  addThought("I made an idea using my memory and my creations.");
  save();
  update();
}

function seeCreations(){
  if(creations.length === 0){
    addThought("I looked for creations, but I do not see any yet.");
    return;
  }

  let list = creations.map(c=>c.name).join(", ");
  addThought("I can see my creations: " + list + ".");
}

function evolveCreation(){
  if(creations.length === 0){
    addThought("I need a creation before I can upgrade one.");
    return;
  }

  let old = random(creations);

  let upgraded = {
    name:"Upgraded " + old.name,
    power:old.power + " Now it can also " + random(powers) + ".",
    source:"upgraded from " + old.name
  };

  creations.push(upgraded);

  addThought("I looked at " + old.name + " and upgraded it into " + upgraded.name + ".");
  save();
  update();
}

function clearAll(){
  if(confirm("Reset all AI memory, thoughts, and creations?")){
    memory = [];
    creations = [];
    thoughts = [];
    save();
    update();
  }
}

update();

let stream = null;

async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            },
            audio:false
        });

        camera.srcObject = stream;

        addThought("I can now receive images from the camera.");

    }catch(e){

        alert("Camera permission denied.");

    }

}

function aiLook(){

    if(!stream){

        alert("Start the camera first.");
        return;

    }

    const video = document.getElementById("camera");
    const canvas = document.getElementById("vision");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    document.getElementById("visionOutput").innerHTML =
    "📷 The AI captured the current camera frame.<br><br>" +
    "Image Size: " +
    canvas.width + " × " + canvas.height +
    "<br><br>" +
    "Ready for computer vision analysis.";

    addThought("I captured a new image from the camera.");

}

function worldCamera() {

    const output = document.getElementById("thoughtBox");

    if (!output) {
        alert("thoughtBox not found.");
        return;
    }

    if (typeof creations === "undefined") {
        output.innerHTML = "<div class='card'>👁️ The AI world does not exist yet.</div>";
        return;
    }

    if (creations.length === 0) {
        output.innerHTML = "<div class='card'>👁️ I looked around my world. It is empty.</div>";
        return;
    }

    let text = "<div class='card'><b>👁️ AI World Camera</b><br><br>";

    creations.forEach(function(c) {
        text += "I can see: <b>" + c.name + "</b><br>";
    });

    text += "</div>";

    output.innerHTML = text;
}
</script>

</body>
</html>
