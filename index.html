<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Creation World</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(#080014,#26104d);
  color:white;
  text-align:center;
}
h1{margin:20px 5px 5px}
p{color:#ddd}
.box{
  background:#17172b;
  margin:14px auto;
  padding:15px;
  width:90%;
  max-width:540px;
  border-radius:16px;
  box-shadow:0 0 12px black;
}
textarea,input{
  width:90%;
  padding:12px;
  margin:7px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
button{
  padding:12px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#8b35ff;
  color:white;
  font-weight:bold;
}
button:active{transform:scale(.96)}
.card{
  background:#272747;
  margin:10px;
  padding:12px;
  border-radius:12px;
  text-align:left;
}
.world{
  background:#060612;
  border:2px solid #8b35ff;
  min-height:220px;
  border-radius:15px;
  position:relative;
  overflow:hidden;
}
.thing{
  position:absolute;
  padding:8px;
  background:#8b35ff;
  border-radius:20px;
  font-size:14px;
}
.small{font-size:13px;color:#bbb}
</style>
</head>

<body>

<h1>🤖 AI Creation World</h1>
<p>The AI can learn, create items, see its world, and upgrade creations.</p>

<div class="box">
  <h2>🧠 Feed the AI</h2>
  <textarea id="feedText" placeholder="Teach the AI something. Example: Make a magical forest with cats, crystals, portals, and secret rooms."></textarea>
  <br>
  <button onclick="feedAI()">Feed AI</button>
</div>

<div class="box">
  <h2>📦 Add Your Own Item</h2>
  <input id="itemName" placeholder="Item name">
  <textarea id="itemPower" placeholder="What does it do?"></textarea>
  <br>
  <button onclick="addItem()">Add Item</button>
</div>

<div class="box">
  <h2>⚙️ AI Buttons</h2>
  <button onclick="makeItem()">AI Make Item</button>
  <button onclick="makeIdea()">AI Make Idea</button>
  <button onclick="worldCamera()">👁️ AI World Camera</button>
  <button onclick="evolveCreation()">Upgrade Creation</button>
  <button onclick="clearAll()">Reset</button>
</div>

<div class="box">
  <h2>🌎 AI World</h2>
  <div id="worldBox" class="world"></div>
</div>

<div class="box">
  <h2>💭 AI Thoughts</h2>
  <div id="thoughtBox">No thoughts yet.</div>
</div>

<div class="box">
  <h2>🧠 AI Memory</h2>
  <div id="memoryBox">No memory yet.</div>
</div>

<div class="box">
  <h2>✨ AI Creations</h2>
  <div id="creationBox">No creations yet.</div>
</div>

<script>
let memory = JSON.parse(localStorage.getItem("ai_memory")) || [];
let creations = JSON.parse(localStorage.getItem("ai_creations")) || [];
let thoughts = JSON.parse(localStorage.getItem("ai_thoughts")) || [];

const words = [
  "portal","crystal","glitch","dream","shadow","button",
  "cat","robot","circus","forest","machine","star","mirror",
  "monster","cloud","clock","secret room","digital world"
];

const powers = [
  "opens a hidden area",
  "creates a new item",
  "protects the world",
  "stores memories",
  "turns ideas into objects",
  "summons a helper",
  "changes the room",
  "makes characters smarter",
  "repairs broken things",
  "unlocks a new power",
  "builds a tiny world"
];

function save(){
  localStorage.setItem("ai_memory", JSON.stringify(memory));
  localStorage.setItem("ai_creations", JSON.stringify(creations));
  localStorage.setItem("ai_thoughts", JSON.stringify(thoughts));
}

function random(list){
  return list[Math.floor(Math.random() * list.length)];
}

function addThought(text){
  thoughts.unshift(text);
  if(thoughts.length > 30){
    thoughts.pop();
  }
  save();
  update();
}

function update(){
  document.getElementById("memoryBox").innerHTML =
    memory.length
    ? memory.map(m => `<div class="card">🧠 ${m}</div>`).join("")
    : "No memory yet.";

  document.getElementById("creationBox").innerHTML =
    creations.length
    ? creations.map(c => `
      <div class="card">
        <b>✨ ${c.name}</b>
        <p>${c.power}</p>
        <div class="small">Source: ${c.source}</div>
      </div>
    `).join("")
    : "No creations yet.";

  document.getElementById("thoughtBox").innerHTML =
    thoughts.length
    ? thoughts.map(t => `<div class="card">💭 ${t}</div>`).join("")
    : "No thoughts yet.";

  drawWorld();
}

function drawWorld(){
  let world = document.getElementById("worldBox");
  world.innerHTML = "";

  creations.forEach((c, index) => {
    let thing = document.createElement("div");
    thing.className = "thing";
    thing.innerText = c.name;

    thing.style.left = ((index * 47) % 75) + "%";
    thing.style.top = ((index * 61) % 75) + "%";

    world.appendChild(thing);
  });
}

function feedAI(){
  let text = document.getElementById("feedText").value.trim();

  if(!text){
    alert("Type something first.");
    return;
  }

  memory.push(text);
  document.getElementById("feedText").value = "";

  addThought("I learned: " + text);
}

function addItem(){
  let name = document.getElementById("itemName").value.trim();
  let power = document.getElementById("itemPower").value.trim();

  if(!name || !power){
    alert("Add an item name and what it does.");
    return;
  }

  creations.push({
    name:name,
    power:power,
    source:"made by you"
  });

  document.getElementById("itemName").value = "";
  document.getElementById("itemPower").value = "";

  addThought("I can see a new creation named " + name + ".");
}

function makeItem(){
  let learned = memory.length ? random(memory) : "a mysterious empty world";

  let name = random(words).toUpperCase() + " " + random(words).toUpperCase();

  let power =
    "This item can " + random(powers) +
    ". It was inspired by: " + learned;

  creations.push({
    name:name,
    power:power,
    source:"AI made it"
  });

  addThought("I made a new item called " + name + ".");
}

function makeIdea(){
  let learned = memory.length ? random(memory) : "nothing yet";
  let creation = creations.length ? random(creations).name : "a new object";

  let idea =
    "Make a world where " + creation +
    " connects with a " + random(words) +
    " and can " + random(powers) +
    ". Use this knowledge: " + learned;

  creations.push({
    name:"AI Idea",
    power:idea,
    source:"AI idea"
  });

  addThought("I made an idea using my memory and creations.");
}

function worldCamera(){
  if(creations.length === 0){
    addThought("👁️ I looked around my world, but it is empty.");
    return;
  }

  let seen = creations.slice(-6).map(c => c.name).join(", ");

  addThought("👁️ Through my world camera, I can see: " + seen + ".");
}

function evolveCreation(){
  if(creations.length === 0){
    addThought("I need a creation before I can upgrade one.");
    return;
  }

  let old = random(creations);

  let upgraded = {
    name:"Upgraded " + old.name,
    power:old.power + " Now it can also " + random(powers) + ".",
    source:"upgraded from " + old.name
  };

  creations.push(upgraded);

  addThought("I looked at " + old.name + " and upgraded it.");
}

function clearAll(){
  if(confirm("Reset all AI memory, thoughts, and creations?")){
    memory = [];
    creations = [];
    thoughts = [];
    save();
    update();
  }
}

update();
</script>

</body>
</html>
